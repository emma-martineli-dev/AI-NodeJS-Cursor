server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Add app="signal-lab" label to all containers in this compose
      - target_label: app
        replacement: signal-lab
      # Add container name label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Add service label from compose
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            event: event
            scenarioType: scenarioType
            scenarioId: scenarioId
      # Promote parsed fields as labels for filtering
      - labels:
          level:
          event:
          scenarioType:
